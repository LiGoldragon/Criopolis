[pack]
name = "philosophy-city"
schema = 2

[[agent]]
name = "mayor"
prompt_template = "agents/mayor/prompt.template.md"
provider = "claude"
[agent.option_defaults]
effort = "max"

[[agent]]
name = "satya"
prompt_template = "agents/satya/prompt.template.md"
provider = "codex"
process_names = ["codex", "codex-raw"]
[agent.option_defaults]
effort = "xhigh"

[[agent]]
name = "viveka"
prompt_template = "agents/viveka/prompt.template.md"
provider = "codex"
process_names = ["codex", "codex-raw"]
[agent.option_defaults]
effort = "xhigh"

[[agent]]
name = "dharma"
prompt_template = "agents/dharma/prompt.template.md"
provider = "claude"
[agent.option_defaults]
effort = "max"

[[agent]]
name = "prayoga"
prompt_template = "agents/prayoga/prompt.template.md"
provider = "codex"
process_names = ["codex", "codex-raw"]
[agent.option_defaults]
effort = "xhigh"

[[agent]]
name = "rasa"
prompt_template = "agents/rasa/prompt.template.md"
provider = "claude"
[agent.option_defaults]
effort = "max"

[[agent]]
name = "librarian"
prompt_template = "agents/librarian/prompt.template.md"
provider = "codex"
process_names = ["codex", "codex-raw"]
[agent.option_defaults]
effort = "xhigh"

[[agent]]
name = "researcher"
prompt_template = "agents/researcher/prompt.template.md"
provider = "codex"
process_names = ["codex", "codex-raw"]
[agent.option_defaults]
effort = "xhigh"

[[named_session]]
template = "mayor"
mode = "always"

[[named_session]]
template = "satya"
mode = "on_demand"

[[named_session]]
template = "viveka"
mode = "on_demand"

[[named_session]]
template = "dharma"
mode = "on_demand"

[[named_session]]
template = "prayoga"
mode = "on_demand"

[[named_session]]
template = "rasa"
mode = "on_demand"

[[named_session]]
template = "librarian"
mode = "on_demand"

[[named_session]]
template = "researcher"
mode = "on_demand"
