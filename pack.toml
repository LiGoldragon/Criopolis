[pack]
name = "criopolis"
schema = 2

[[agent]]
name = "dog"
scope = "city"
prompt_template = "agents/dog/prompt.template.md"
nudge = "Check your hook for work assignments."
work_dir = ".gc/agents/dogs/{{.AgentBase}}"
overlay_dir = ".gc/system/packs/maintenance/agents/dog/overlay"
idle_timeout = "2h"
min_active_sessions = 0
max_active_sessions = 3

[[named_session]]
template = "mayor"
mode = "always"

[[named_session]]
template = "satya"
mode = "on_demand"

[[named_session]]
template = "viveka"
mode = "on_demand"

[[named_session]]
template = "dharma"
mode = "on_demand"

[[named_session]]
template = "prayoga"
mode = "on_demand"

[[named_session]]
template = "rasa"
mode = "on_demand"

[[named_session]]
template = "librarian"
mode = "on_demand"

[[named_session]]
template = "researcher"
mode = "on_demand"

[[named_session]]
template = "explorer"
mode = "on_demand"

[[named_session]]
template = "code-writer"
mode = "on_demand"

[[named_session]]
template = "cascade-tester"
mode = "on_demand"

[[named_session]]
template = "committer"
mode = "on_demand"

[[named_session]]
template = "maintainer"
mode = "on_demand"

[providers]
[providers.claude]
base = "builtin:claude"

[providers.codex]
base = "builtin:codex"
ready_delay_ms = 0
